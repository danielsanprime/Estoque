<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE DANIEL SAN</title>
<style>
body{background:#0f1115;color:#fff;font-family:Arial;margin:0;padding-bottom:90px}
header{background:#e60023;padding:18px;text-align:center;font-weight:bold;font-size:20px}
.container{padding:16px;max-width:900px;margin:auto}
.item{background:#151a22;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.qty{background:#2a2f3a;border-radius:8px;padding:6px 12px;min-width:50px;text-align:center;margin:0 6px}
.controls button{background:#333;color:#fff;border:none;width:34px;height:34px;border-radius:8px;font-size:18px}
.footer{position:fixed;bottom:0;left:0;right:0;background:#25D366;padding:16px;text-align:center;font-weight:bold;font-size:18px}
.lock{position:fixed;right:16px;bottom:90px;background:#ff5722;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
.modal{display:none;position:fixed;inset:0;background:#000a;overflow:auto}
.modalbox{background:#111;margin:20px auto;padding:20px;border-radius:12px;max-width:800px}
.tab{background:#1c2230;color:#fff;border:none;padding:8px 12px;border-radius:8px;white-space:nowrap}
.tab.active{background:#e60023}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, updateDoc, setDoc, onSnapshot, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAsrL3eJLWArVegBk4NqrL8m5DsdoA6f1Q",authDomain:"estoque-daniel-san.firebaseapp.com",projectId:"estoque-daniel-san",storageBucket:"estoque-daniel-san.firebasestorage.app",messagingSenderId:"355146085358",appId:"1:355146085358:web:d20d238a253df446aa14ff"};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);
const produtos=['alga', 'amendoas', 'arroz_japones', 'bancha', 'castanha_de_caju', 'galao_de_shoyu_20_l', 'gas_macarico', 'gengibre', 'gergelim', 'hondashi', 'macarrao_yakissoba', 'missoshiro_barco', 'molho_agridoce', 'oleo_gergelim', 'panko', 'pimenta_sriracha', 'saque_dourado', 'saque_soft', 'saque_mirim_culinario', 'vinagre_de_arroz', 'wasabi', 'acucar_normal', 'acucar_refinado', 'adocante', 'amido_de_milho', 'arroz_normal', 'azeite', 'azeite_trufado', 'cafe', 'cafe_de_maquina', 'calda_de_sorvete', 'capsula_de_gas', 'chocolate_em_po', 'creme_de_leite', 'coco_ralado', 'doce_de_leite', 'doce_de_leite_choco', 'doritos', 'farinha_de_trigo', 'farofa', 'feijao', 'feijao_preto', 'goiabada', 'leite', 'leite_condensado', 'macarrao', 'maionese', 'margarina_15_kg', 'molho_de_tomate', 'mostarda', 'oleo', 'palito_de_churrasco', 'pimenta_biquinho', 'pimenta_do_reino', 'sal_normal', 'sal_himalaia', 'tomate_seco', 'vinagre', 'meledamame', 'guioza_bovina', 'guioza_suina', 'massa_harumaki', 'ovas_de_capelin', 'shimeji', 'shitake', 'tofu', 'atum', 'camarao_com_casca', 'camarao_sem_casca', 'kanekama', 'lula_tentaculos', 'lula_em_aneis', 'peixe_prego', 'polvo', 'salmao_caixas', 'tilapia', 'brocolis', 'requeijao', 'cream_cheese', 'file_mignon', 'frango_sassami', 'massa_de_pastel', 'mussarela', 'petit_gateau', 'picanha', 'batata_palito', 'carne_de_mistura', 'hamburguer', 'polpa_abacaxi', 'polpa_frutas_vermelhas', 'polpa_maracuja', 'sorvete', 'polpa_de_morango', 'agua_sanitaria', 'bucha_cozinha', 'desinfetante', 'detergente', 'glade', 'limpa_vidro', 'lustra_moveis', 'sabao_em_po', 'alcool_70_gel', 'alcool_70_liquido', 'alcool_92', 'bobina_impressora', 'bobina_maquininha', 'bobina_picotada_20x30', 'bobina_picotada_35x45', 'bucha_limpa_grill', 'canudo_fino_6_mm', 'canudo_grosso_8_mm', 'copo_300_ml', 'copo_cafe', 'enxaguante_bucal', 'etiqueta_de_data', 'garrafinha_suco', 'guardanapo_embalado', 'guardanapo_perola', 'hf_100_4_div_base', 'hf_100_tampa', 'hf_70_base_teppan', 'hf_70_tampa', 'luva_nitrica_preta', 'luva_limpeza_amarela', 'palito_dente_embalad', 'palito_dente_granel', 'pano_de_chao', 'pano_perfex', 'papel_higienico', 'papel_toalha_banhei', 'plastico_filme', 'pote_sunomono', 'pote_poke_g681', 'pote_poke_g684', 'pote_tare_g_695_bran', 'removedor_magico', 'sabonete_liquido', 'sache_de_acucar', 'sache_de_sal', 'saco_de_lixo_200_l', 'saco_de_lixo_40_l', 'saco_talher', 'touca', 'emb_caixa_g_delivery', 'emb_caixa_p_delivery', 'emb_sacola_delivery', 'temakeira', 'caixa_yakissoba', 'etiqueta', 'adesivo_lacre_delivery', 'mascara', 'palito_robata', 'hashi', 'shoyu_primium', 'shoyu_light'];
const ref=doc(db,"estoque","produtos");

let dados={};
let pedidos={};
let filtro='todos'; let termoBusca='';
window.setCat = function(e,c){filtro=c;window.render();document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));e.target.classList.add('active');}
function categorizar(p){
 p=p.toLowerCase();
 if(p.includes('salmao')||p.includes('atum')||p.includes('tilapia')||p.includes('polvo')||p.includes('lula')||p.includes('camarao')) return 'peixes';
 if(p.includes('detergente')||p.includes('alcool')||p.includes('desinfetante')||p.includes('sabao')||p.includes('limpa')) return 'limpeza';
 if(p.includes('caixa')||p.includes('pote')||p.includes('hashi')||p.includes('saco')||p.includes('emb_')||p.includes('etiqueta')) return 'embalagem';
 if(p.includes('arroz')||p.includes('alga')||p.includes('hondashi')||p.includes('wasabi')||p.includes('gergelim')||p.includes('gengibre')) return 'cozinha';
 return 'secos';
}


window.addEventListener("DOMContentLoaded",()=>{
const lista=document.getElementById("lista");

onSnapshot(ref,(snap)=>{
 dados=snap.exists()?snap.data():{};
 render();
});

window.render=function render(){
 lista.innerHTML="";
 
produtos.forEach(p=>{
 if((filtro!='todos' && categorizar(p)!==filtro) || (termoBusca && !p.toLowerCase().includes(termoBusca))) return;

  const qtd=dados[p]||0;
  const ped=pedidos[p]||0;
  const div=document.createElement("div");
  div.className="item";
  div.innerHTML=`<div><b>${p.replaceAll('_',' ').toUpperCase()}</b><div>Estoque: ${qtd}</div></div>
  <div class='controls'>
   <button class='m'>-</button>
   <span class='qty'>${ped}</span>
   <button class='p'>+</button>
  </div>`;
  div.querySelector('.m').onclick=()=>{pedidos[p]=Math.max(0,(pedidos[p]||0)-1);render();};
  div.querySelector('.p').onclick=()=>{pedidos[p]=(pedidos[p]||0)+1;render();};
  lista.appendChild(div);
 });
}
});

window.enviar=async()=>{
let txt="Baixa de estoque:%0A%0A";let up={};let ok=false;

produtos.forEach(p=>{
 if((filtro!='todos' && categorizar(p)!==filtro) || (termoBusca && !p.toLowerCase().includes(termoBusca))) return;
let q=pedidos[p]||0;if(q>0){txt+=`- ${p.replaceAll('_',' ').toUpperCase()}: ${q}%0A`;up[p]=Math.max(0,(dados[p]||0)-q);ok=true;}});
if(!ok)return alert("Sem itens");
await updateDoc(ref,up);
await addDoc(collection(db,"logs"),{data:Date.now(),itens:up});
window.open("https://wa.me/551634423799?text="+txt,"_blank");
pedidos={};
}

window.abrirGerente=()=>{
const m=document.getElementById("modal");
const l=document.getElementById("listaGer");
l.innerHTML="";

produtos.forEach(p=>{
 if((filtro!='todos' && categorizar(p)!==filtro) || (termoBusca && !p.toLowerCase().includes(termoBusca))) return;

 let v=dados[p]||0;
 const r=document.createElement("div");
 r.className="item";
 r.innerHTML=`<span>${p.replaceAll('_',' ').toUpperCase()}</span>
 <div class='controls'><button onclick="this.nextElementSibling.stepDown()">-</button>
 <input type='number' value='${v}' data-p='${p}' style='width:70px;text-align:center'>
 <button onclick="this.previousElementSibling.stepUp()">+</button></div>`;
 l.appendChild(r);
});
m.style.display="block";
}

window.salvarEstoque=async()=>{
let obj={};
document.querySelectorAll('#listaGer input').forEach(i=>obj[i.dataset.p]=parseInt(i.value)||0);
await setDoc(ref,obj);
document.getElementById("modal").style.display="none";
}


window.lock=()=>{
 let s=prompt("Senha gerente");
 if(s==="864300"){
   document.getElementById("menuGerente").style.display="block";
 }else alert("Senha incorreta");
}
window.fecharMenu=()=>document.getElementById("menuGerente").style.display="none";


window.gerarPDF = async () => {
 const sete=Date.now()-7*24*60*60*1000;
 const q=query(collection(db,"logs"),where("data",">=",sete));
 const snap=await getDocs(q);
 const agora=new Date();
const dia=agora.getDay();
const diff=(dia===0?-6:1-dia);
const segunda=new Date(agora);segunda.setDate(agora.getDate()+diff);segunda.setHours(0,0,0,0);
const domingo=new Date(segunda);domingo.setDate(segunda.getDate()+6);domingo.setHours(23,59,59,999);
let txt="RELATORIO SEMANAL\n";
txt+="Periodo: "+segunda.toLocaleDateString()+" ate "+domingo.toLocaleDateString()+"\n";
txt+="Gerado em: "+agora.toLocaleString()+"\n\n";
 snap.forEach(d=>{
  const itens=d.data().itens;
  txt+="---\n";
  Object.keys(itens).forEach(k=>{txt+=k.replaceAll('_',' ').toUpperCase()+": "+itens[k]+"\n"});
 });
 const w=window.open("");
 w.document.write("<pre>"+txt+"</pre>");
 w.print();
};

document.addEventListener('input',e=>{if(e.target && e.target.id==='buscaNome'){termoBusca=e.target.value.toLowerCase(); window.render();}});

let pedidosManual={};
window.abrirListaPedido=()=>{
 const m=document.getElementById("modalPedido");
 const l=document.getElementById("listaPedido");
 l.innerHTML="";
 produtos.forEach(p=>{
  const row=document.createElement("div");
  row.className="item";
  row.innerHTML=`<span>${p.replaceAll('_',' ').toUpperCase()}</span>
  <div class='controls'><button>-</button><span class='qty'>0</span><button>+</button></div>`;
  const menos=row.querySelectorAll('button')[0];
  const mais=row.querySelectorAll('button')[1];
  const span=row.querySelector('.qty');
  menos.onclick=()=>{pedidosManual[p]=Math.max(0,(pedidosManual[p]||0)-1);span.textContent=pedidosManual[p];};
  mais.onclick=()=>{pedidosManual[p]=(pedidosManual[p]||0)+1;span.textContent=pedidosManual[p];};
  l.appendChild(row);
 });
 m.style.display="block";
}

window.enviarListaPedido=()=>{
 let txt="LISTA DE PEDIDO:%0A%0A";
 let ok=false;
 Object.keys(pedidosManual).forEach(p=>{
  if(pedidosManual[p]>0){
    txt+=p.replaceAll('_',' ').toUpperCase()+": "+pedidosManual[p]+"%0A";
    ok=true;
  }
 });
 if(!ok){alert("Nenhum item selecionado");return;}
 window.open("https://wa.me/551634423799?text="+txt,"_blank");
 pedidosManual={};
 document.getElementById("modalPedido").style.display="none";
}


// ===== CMV =====
let tabelaCMV = JSON.parse(localStorage.getItem("cmv_tabela") || "{}");

window.abrirCMV = function(){
 const l = document.getElementById("listaCMV");
 l.innerHTML = "";
 produtos.forEach(p=>{
   const valor = tabelaCMV[p] || 0;
   const row = document.createElement("div");
   row.className = "item";
   row.innerHTML = `
     <span>${p.replaceAll('_',' ').toUpperCase()}</span>
     <input type="number" step="0.01" value="${valor}" 
       data-p="${p}" style="width:90px;text-align:center">
   `;
   l.appendChild(row);
 });
 document.getElementById("modalCMV").style.display="block";
}

window.salvarCMV = function(){
 document.querySelectorAll("#listaCMV input").forEach(i=>{
   tabelaCMV[i.dataset.p] = parseFloat(i.value) || 0;
 });
 localStorage.setItem("cmv_tabela", JSON.stringify(tabelaCMV));
 document.getElementById("modalCMV").style.display="none";
}

// Intercepta texto antes de enviar WhatsApp
const enviarOriginal = window.enviar;
window.enviar = async function(){

 let txt = "Baixa de estoque:%0A%0A";
 let up = {};
 let ok = false;
 let totalCMV = 0;

 produtos.forEach(p=>{
  if((filtro!='todos' && categorizar(p)!==filtro) 
     || (termoBusca && !p.toLowerCase().includes(termoBusca))) return;

  let q = pedidos[p] || 0;
  if(q > 0){
    txt += `- ${p.replaceAll('_',' ').toUpperCase()}: ${q}%0A`;
    up[p] = Math.max(0,(dados[p]||0)-q);
    totalCMV += q * (tabelaCMV[p] || 0);
    ok = true;
  }
 });

 if(!ok) return alert("Sem itens");

 await updateDoc(ref, up);
 await addDoc(collection(db,"logs"),{data:Date.now(),itens:up});

 if(totalCMV > 0){
   txt += `%0A%0ACMV TOTAL: R$ ${totalCMV.toFixed(2)}`;
 }

 window.open("https://wa.me/551634423799?text=" + txt,"_blank");
 pedidos = {};
}

</script>
</head>
<body>
<header>ESTOQUE DANIEL SAN</header>
<div id="tabs" style="display:flex;gap:6px;overflow:auto;padding:8px;background:#0b0d11;align-items:center">
<button onclick="setCat(event,'todos')" class="tab active">Todos</button>
<button onclick="setCat(event,'peixes')" class="tab">Peixes</button>
<input id="buscaNome" placeholder="Buscar produto..." style="margin-left:auto;padding:8px;border-radius:8px;border:none;min-width:180px">
</div>
<div class="container" id="lista"></div>
<div class="lock" onclick="lock()">🔒</div>
<div class="footer" onclick="enviar()">Enviar e dar baixa</div>


<div id="menuGerente" class="modal">
 <div class="modalbox">
  <h2>Gerente</h2>
  <button onclick="abrirGerente();fecharMenu()" style="width:100%;margin:10px 0;padding:14px;font-size:20px;background:#2196F3;border:none;border-radius:10px;color:#fff">📦 Estoque</button>
  <button onclick="gerarPDF();fecharMenu()" style="width:100%;margin:10px 0;padding:14px;font-size:20px;background:#4CAF50;border:none;border-radius:10px;color:#fff">📄 Relatório semanal</button><button onclick="abrirListaPedido();fecharMenu()" style="width:100%;margin:10px 0;padding:14px;font-size:20px;background:#ff9800;border:none;border-radius:10px;color:#fff">🧾 Lista de pedido</button><button onclick="abrirCMV();fecharMenu()" style="width:100%;margin:10px 0;padding:14px;font-size:20px;background:#795548;border:none;border-radius:10px;color:#fff">💰 CMV</button>
 </div>
</div>

<div id="modal" class="modal">
<div class="modalbox">
<h2>Ajustar estoque</h2>
<div id="listaGer"></div>
<button onclick="salvarEstoque()" style="width:100%;margin-top:12px;padding:16px;font-size:20px;background:#4CAF50;border:none;border-radius:12px;color:#fff">Salvar estoque</button>
</div>
</div>

<div id="modalPedido" class="modal">
<div class="modalbox">
<h2>Lista de pedido</h2>
<div id="listaPedido"></div>
<button onclick="enviarListaPedido()" style="width:100%;margin-top:10px;background:#25D366;padding:16px;font-size:18px;border:none;border-radius:10px;color:#fff">Enviar para WhatsApp</button>
</div>
</div>


<div id="modalCMV" class="modal">
<div class="modalbox">
<h2>Valores CMV</h2>
<div id="listaCMV"></div>
<button onclick="salvarCMV()" 
style="width:100%;margin-top:12px;padding:16px;font-size:18px;
background:#4CAF50;border:none;border-radius:10px;color:#fff">
Salvar valores
</button>
</div>
</div>

</body>
