<!DOCTYPE html><html lang='pt-br'><head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>ESTOQUE DANIEL SAN</title>
<style>
body{background:#0f1115;color:#fff;font-family:Arial;margin:0}

<script type='module'>

window.addEventListener("DOMContentLoaded",()=>{const lista=document.getElementById("lista");const busca=document.getElementById("busca");
onSnapshot(ref,(snap)=>{const dados=snap.exists()?snap.data():{};lista.innerHTML="";
produtos.forEach(p=>{if(busca.value && !p.includes(busca.value.toLowerCase())) return;const qtd=dados[p]||0;
const div=document.createElement("div");div.className="item";
div.innerHTML=`<div>${p}</div><div class='controls'><button>-</button><span class='qty'>${qtd}</span><button>+</button></div>`;
const [menos,mais]=div.querySelectorAll("button");
menos.onclick=()=>updateDoc(ref,{[p]:Math.max(0,qtd-1)});mais.onclick=()=>updateDoc(ref,{[p]:qtd+1});
lista.appendChild(div);});});busca.oninput=()=>onSnapshot(ref,()=>{});});
async function zerar(){let obj={};produtos.forEach(p=>obj[p]=0);await setDoc(ref,obj);}window.zerar=zerar;
</script></head><body>
<header>ESTOQUE DANIEL SAN</header>
<div class='topbar'><input id='busca' placeholder='Buscar produto...'><button onclick='zerar()'>Zerar</button></div>
