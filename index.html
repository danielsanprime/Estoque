<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE DANIEL SAN</title>
<style>
body{background:#0f1115;color:#fff;font-family:Arial;margin:0}
header{background:#e60023;padding:15px;text-align:center;font-weight:bold;font-size:20px}
.container{padding:15px;max-width:900px;margin:auto}
.item{display:flex;justify-content:space-between;align-items:center;background:#151a22;padding:15px;border-radius:15px;margin-bottom:12px}
.controls button{background:#333;border:none;color:#fff;font-size:20px;width:40px;height:40px;border-radius:10px}
.controls span{margin:0 10px;font-size:18px;min-width:20px;display:inline-block;text-align:center}
.stock{background:#ccc;color:#000;padding:5px 10px;border-radius:6px;min-width:40px;text-align:center}
.green{background:#37c173;color:#fff}
.send{position:fixed;bottom:0;width:100%;background:#2ecc71;color:#fff;text-align:center;padding:18px;font-size:18px;font-weight:bold}
.fab{position:fixed;bottom:90px;right:20px;width:60px;height:60px;border-radius:50%;background:#ff5a1f;color:#fff;font-size:26px;border:none;cursor:pointer}
.fab-menu{position:fixed;bottom:160px;right:20px;background:#1b1f27;padding:15px;border-radius:12px;display:none}
.fab-menu button{display:block;width:220px;margin-bottom:10px;padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<header>CONTROLE DE ESTOQUE</header>
<div class="container" id="lista"></div>
<div class="send" onclick="darBaixa()">Enviar e dar baixa</div>
<button class="fab" onclick="toggleMenu()">🔒</button>

<div class="fab-menu" id="menu">
<button onclick="pedidoSemana()">Pedidos da Semana</button>
<button onclick="relatorioSemanal()">PDF semanal</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyAsrL3eJLWArVegBk4NqrL8m5DsdoA6f1Q",authDomain:"estoque-daniel-san.firebaseapp.com",projectId:"estoque-daniel-san"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const numeroWhats="551634423799";

// lista resumida — você pode editar depois se quiser
const itens=["ALGA","ARROZ JAPONÊS","GENGIBRE","GERGELIM","HONDASHI","SHOYU","SALMÃO","CREAM CHEESE","ARROZ","VINAGRE"];

const lista=document.getElementById("lista");

function chave(nome){return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"_").toLowerCase();}

itens.forEach(nome=>{
 const id=chave(nome);
 lista.innerHTML+=`<div class="item"><div><b>${nome}</b><br>Estoque: <span id="stock_${id}" class="stock">0</span></div>
 <div class="controls"><button onclick="menos('${id}')">-</button><span id="qtd_${id}">0</span><button onclick="mais('${id}')">+</button></div></div>`;

 db.collection("estoque").doc(id).onSnapshot(doc=>{
   const valor=doc.exists?doc.data().qtd:0;
   const el=document.getElementById("stock_"+id);
   el.innerText=valor;
   el.className="stock "+(valor>2?"green":"");
 });
});

function mais(id){let e=document.getElementById("qtd_"+id);e.innerText=parseInt(e.innerText)+1;}
function menos(id){let e=document.getElementById("qtd_"+id);e.innerText=Math.max(0,parseInt(e.innerText)-1);}

async function darBaixa(){
 let texto="Baixa do estoque:\n";
 let log={data:Date.now(),itens:{}};
 for(const nome of itens){
  const id=chave(nome);
  const qtd=parseInt(document.getElementById("qtd_"+id).innerText);
  if(qtd>0){
    const ref=db.collection("estoque").doc(id);
    await db.runTransaction(async t=>{
      const doc=await t.get(ref);
      const atual=doc.exists?doc.data().qtd:0;
      t.set(ref,{qtd:atual-qtd});
    });
    texto+=nome+": "+qtd+"\n";
    log.itens[nome]=qtd;
    document.getElementById("qtd_"+id).innerText=0;
  }
 }
 if(Object.keys(log.itens).length>0){
   await db.collection("logs").add(log);
   window.open("https://wa.me/"+numeroWhats+"?text="+encodeURIComponent(texto));
 }
}

function toggleMenu(){const m=document.getElementById("menu");m.style.display=m.style.display=="block"?"none":"block";}

async function pedidoSemana(){
 let msg="Pedido da semana:\n";
 itens.forEach(nome=>{msg+=nome+"\n";});
 window.open("https://wa.me/"+numeroWhats+"?text="+encodeURIComponent(msg));
}

async function relatorioSemanal(){
 const semana=Date.now()-7*24*60*60*1000;
 let texto="Relatório semanal:\n";
 const snap=await db.collection("logs").get();
 snap.forEach(d=>{
  const data=d.data();
  if(data.data>=semana){
   for(const i in data.itens) texto+=i+": "+data.itens[i]+"\n";
  }
 });
 const w=window.open("");
 w.document.write("<pre>"+texto+"</pre>");
 w.print();
}
</script>
</body>
</html>
