
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controle de Estoque</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial}
header{background:#d80000;padding:16px;text-align:center;font-size:22px;font-weight:bold}
#search{width:92%;margin:10px auto;display:block;padding:12px;border-radius:10px;border:none;font-size:16px}
.item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333}
.controls{display:flex;gap:8px;align-items:center}
.btn{width:32px;height:32px;border:none;background:#333;color:white;border-radius:8px;font-size:18px}
.qty{width:30px;text-align:center}
#send{position:fixed;bottom:0;left:0;right:0;background:#25D366;padding:18px;text-align:center;font-weight:bold}
#lock{position:fixed;bottom:80px;right:15px;background:#ff7a00;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.menu{position:fixed;top:0;left:0;right:0;bottom:0;background:#000000dd;display:none;align-items:center;justify-content:center}
.menuBox{background:#111;padding:20px;border-radius:16px;width:90%;max-width:420px}
.menuBtn{padding:16px;border-radius:12px;margin-bottom:10px;text-align:center;font-size:18px;cursor:pointer}
.azul{background:#2f86d6} .verde{background:#4caf50} .laranja{background:#ff9800} .marrom{background:#795548}
.close{float:right;font-size:22px;cursor:pointer}
.screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;padding:20px;overflow:auto;display:none}
.row{display:flex;justify-content:space-between;margin-bottom:8px}
.save{background:#25D366;padding:14px;border-radius:10px;margin-top:20px;text-align:center}
</style>
</head>

<body>

<header>ESTOQUE</header>
<input id="search" placeholder="🔎 Buscar produto">
<div id="lista"></div>

<div id="lock">🔒</div>
<div id="send">📲 ENVIAR E DAR BAIXA</div>

<div id="menu" class="menu">
<div class="menuBox">
<div class="close" onclick="menu.style.display='none'">✕</div>
<h2>Gerente</h2>
<div class="menuBtn azul" onclick="abrirEstoque()">📦 Estoque</div>
<div class="menuBtn laranja" onclick="abrirPedido()">🧾 Lista de pedido</div>
<div class="menuBtn marrom" onclick="abrirCMV()">💰 CMV</div>
<div class="menuBtn verde" onclick="relatorioPDF()">📄 Relatório semanal</div>
</div>
</div>

<div id="estoqueScreen" class="screen">
<div class="close" onclick="fechar()">✕</div>
<h2>Adicionar estoque</h2>
<div id="estoqueLista"></div>
<div class="save" onclick="salvarEstoque()">Salvar estoque</div>
</div>

<div id="cmvScreen" class="screen">
<div class="close" onclick="fechar()">✕</div>
<h2>CMV</h2>
<div id="cmvLista"></div>
<div class="save" onclick="salvarCMV()">Salvar CMV</div>
</div>

<div id="pedidoScreen" class="screen">
<div class="close" onclick="fechar()">✕</div>
<h2>Lista de pedido</h2>
<div id="pedidoLista"></div>
<div class="save" onclick="enviarPedido()">Enviar WhatsApp</div>
</div>

<script>

const produtos=["alga","amendoas","arroz_japones","bancha","castanha_de_caju","galao_de_shoyu_20_l","gas_macarico","gengibre","gergelim","hondashi","macarrao_yakissoba","missoshiro_barco","molho_agridoce","oleo_gergelim","panko","pimenta_sriracha","saque_dourado","saque_soft","saque_mirim_culinario","vinagre_de_arroz","wasabi","acucar_normal","acucar_refinado","adocante","amido_de_milho","arroz_normal","azeite","azeite_trufado","cafe","cafe_de_maquina","calda_de_sorvete","capsula_de_gas","chocolate_em_po","creme_de_leite","coco_ralado","doce_de_leite","doce_de_leite_choco","doritos","farinha_de_trigo","farofa","feijao","feijao_preto","goiabada","leite","leite_condensado","macarrao","maionese","margarina_15_kg","molho_de_tomate","mostarda","oleo","palito_de_churrasco","pimenta_biquinho","pimenta_do_reino","sal_normal","sal_himalaia","tomate_seco","vinagre","mel","edamame","guioza_bovina","guioza_suina","massa_harumaki","ovas_de_capelin","shimeji","shitake","tofu","atum","camarao_com_casca","camarao_sem_casca","kanekama","lula_tentaculos","lula_em_aneis","peixe_prego","polvo","salmao_caixas","tilapia","brocolis","requeijao","cream_cheese","file_mignon","frango_sassami","massa_de_pastel","mussarela","petit_gateau","picanha","batata_palito","carne_de_mistura","hamburguer","polpa_abacaxi","polpa_frutas_vermelhas","polpa_maracuja","sorvete","polpa_de_morango","agua_sanitaria","bucha_cozinha","desinfetante","detergente","glade","limpa_vidro","lustra_moveis","sabao_em_po","alcool_70_gel","alcool_70_liquido","alcool_92","bobina_impressora","bobina_maquininha","bobina_picotada_20x30","bobina_picotada_35x45","bucha_limpa_grill","canudo_fino_6_mm","canudo_grosso_8_mm","copo_300_ml","copo_cafe","enxaguante_bucal","etiqueta_de_data","garrafinha_suco","guardanapo_embalado","guardanapo_perola","hf_100_4_div_base","hf_100_tampa","hf_70_base_teppan","hf_70_tampa","luva_nitrica_preta","luva_limpeza_amarela","palito_dente_embalad","palito_dente_granel","pano_de_chao","pano_perfex","papel_higienico","papel_toalha_banhei","plastico_filme","pote_sunomono","pote_poke_g681","pote_poke_g684","pote_tare_g_695_bran","removedor_magico","sabonete_liquido","sache_de_acucar","sache_de_sal","saco_de_lixo_200_l","saco_de_lixo_40_l","saco_talher","touca","emb_caixa_g_delivery","emb_caixa_p_delivery","emb_sacola_delivery","temakeira","caixa_yakissoba","etiqueta","adesivo_lacre_delivery","mascara","palito_robata","hashi","shoyu_primium","shoyu_light"]

let estoque=JSON.parse(localStorage.getItem("estoque")||"{}")
let pedidos={}
let pedidosCompra={}
let cmv=JSON.parse(localStorage.getItem("cmv")||"{}")
let historico=JSON.parse(localStorage.getItem("historico")||"[]")

const lista=document.getElementById("lista")

function criarLista(){
lista.innerHTML=""
produtos.forEach(p=>{
let est=estoque[p]||0
let div=document.createElement("div")
div.className="item"
div.innerHTML=`
<div>
${p.replaceAll("_"," ").toUpperCase()}<br>
<small>Estoque: <span id="est_${p}">${est}</span></small>
</div>
<div class="controls">
<button class="btn" onclick="menos('${p}')">-</button>
<div id="q_${p}" class="qty">0</div>
<button class="btn" onclick="mais('${p}')">+</button>
</div>`
lista.appendChild(div)
})
}

function mais(p){pedidos[p]=(pedidos[p]||0)+1;document.getElementById("q_"+p).innerText=pedidos[p]}
function menos(p){pedidos[p]=Math.max(0,(pedidos[p]||0)-1);document.getElementById("q_"+p).innerText=pedidos[p]}

send.onclick=()=>{
let txt="Baixa estoque:%0A"
let total=0
for(let p in pedidos){
let q=pedidos[p]
if(q>0){
txt+=p+" : "+q+"%0A"
estoque[p]=(estoque[p]||0)-q
if(cmv[p]) total+=cmv[p]*q
historico.push({produto:p,qtd:q,data:new Date().toISOString()})
}
}
txt+="%0ACMV TOTAL: R$ "+total.toFixed(2)
salvarFirebase()
salvarFirebase()
window.open("https://wa.me/?text="+txt)
pedidos={}
criarLista()
}

lock.onclick=()=>{let s=prompt("Senha gerente");if(s==="864300")menu.style.display="flex"}

function abrirEstoque(){
menu.style.display="none"
estoqueScreen.style.display="block"
let html=""
produtos.forEach(p=>{html+=`<div class="row"><span>${p}</span><input id="add_${p}" type="number" placeholder="+"></div>`})
estoqueLista.innerHTML=html
}

function salvarEstoque(){
produtos.forEach(p=>{
let c=document.getElementById("add_"+p)
if(c&&c.value!=""){estoque[p]=(estoque[p]||0)+Number(c.value)}
})
salvarFirebase()
fechar();criarLista()
}

function abrirCMV(){
menu.style.display="none"
cmvScreen.style.display="block"
let html=""
produtos.forEach(p=>{html+=`<div class="row"><span>${p}</span><input id="cmv_${p}" type="number" value="${cmv[p]||0}"></div>`})
cmvLista.innerHTML=html
}

function salvarCMV(){
produtos.forEach(p=>{let c=document.getElementById("cmv_"+p);if(c)cmv[p]=Number(c.value)})
salvarFirebase()
fechar()
}

function abrirPedido(){
menu.style.display="none"
pedidoScreen.style.display="block"
let html=""
produtos.forEach(p=>{
let q=pedidosCompra[p]||0
html+=`<div class="item"><div>${p}</div><div class="controls">
<button class="btn" onclick="menosPedido('${p}')">-</button>
<div class="qty">${q}</div>
<button class="btn" onclick="maisPedido('${p}')">+</button>
</div></div>`
})
pedidoLista.innerHTML=html
}

function maisPedido(p){pedidosCompra[p]=(pedidosCompra[p]||0)+1;abrirPedido()}
function menosPedido(p){pedidosCompra[p]=Math.max(0,(pedidosCompra[p]||0)-1);abrirPedido()}

function enviarPedido(){
let txt="Lista pedido:%0A"
for(let p in pedidosCompra){if(pedidosCompra[p]>0)txt+=p+" : "+pedidosCompra[p]+"%0A"}
window.open("https://wa.me/?text="+txt)
}

function relatorioPDF(){
const {jsPDF}=window.jspdf
let doc=new jsPDF()

let hoje=new Date()
let dia=hoje.getDay()

let segunda=new Date(hoje)
segunda.setDate(hoje.getDate()-(dia===0?6:dia-1))

let sabado=new Date(segunda)
sabado.setDate(segunda.getDate()+5)

doc.text("Relatorio semanal estoque",20,20)
doc.text("Periodo: "+segunda.toLocaleDateString("pt-BR")+" ate "+sabado.toLocaleDateString("pt-BR"),20,30)

let y=40

historico.forEach(h=>{
let d=new Date(h.data)
if(d>=segunda && d<=sabado){
doc.text(h.produto+" : "+h.qtd,20,y)
y+=8
}
})

doc.save("relatorio_semanal.pdf")
}

function fechar(){document.querySelectorAll(".screen").forEach(s=>s.style.display="none")}

search.oninput=e=>{
let f=e.target.value.toLowerCase()
document.querySelectorAll(".item").forEach(el=>{
el.style.display=el.innerText.toLowerCase().includes(f)?"flex":"none"
})
}

criarLista()

</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAsrL3eJLWArVegBk4NqrL8m5DsdoA6f1Q",
  authDomain: "estoque-daniel-san.firebaseapp.com",
  projectId: "estoque-daniel-san",
  storageBucket: "estoque-daniel-san.firebasestorage.app",
  messagingSenderId: "355146085358",
  appId: "1:355146085358:web:d20d238a253df446aa14ff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function salvarFirebase(){
db.collection("sistema").doc("dados").set({
estoque:estoque,
cmv:cmv,
historico:historico
});
}

function carregarFirebase(){
db.collection("sistema").doc("dados").onSnapshot((doc)=>{
let d = doc.data();
if(!d) return;
estoque = d.estoque || {};
cmv = d.cmv || {};
historico = d.historico || [];
criarLista();
});
}
</script>

<script>carregarFirebase()</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAsrL3eJLWArVegBk4NqrL8m5DsdoA6f1Q",
  authDomain: "estoque-daniel-san.firebaseapp.com",
  projectId: "estoque-daniel-san",
  storageBucket: "estoque-daniel-san.firebasestorage.app",
  messagingSenderId: "355146085358",
  appId: "1:355146085358:web:d20d238a253df446aa14ff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function salvarFirebase(){
db.collection("sistema").doc("dados").set({
estoque: estoque,
cmv: cmv,
historico: historico
},{merge:true});
}

function iniciarFirebase(){
db.collection("sistema").doc("dados").onSnapshot((doc)=>{
let d = doc.data();
if(!d) return;
estoque = d.estoque || {};
cmv = d.cmv || {};
historico = d.historico || [];
criarLista();
});
}

setTimeout(iniciarFirebase,1000);
</script>

</body>
</html>
